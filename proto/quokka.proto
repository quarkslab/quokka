syntax = "proto3";
package quokka;

message Quokka {
  message ExporterMeta {
    enum Mode {
      MODE_LIGHT = 0;
      MODE_SELF_CONTAINED = 1;
    }

    Mode mode = 1;
    string version = 2;  // Quokka version
  }

  enum AddressSize {
    ADDR_UNK = 0;
    ADDR_32 = 1;
    ADDR_64 = 2;
  }

  enum CallingConvention {
    CC_UNK = 0;
    CC_CDECL = 1;
    CC_ELLIPSIS = 2;
    CC_STDCALL = 3;
    CC_PASCAL = 4;
    CC_FASTCALL = 5;
    CC_THISCALL = 6;
    CC_SWIFT = 7;
    CC_GOLANG = 8;
    CC_GOSTK = 9;
  }

  message Meta {
    enum ISA {
      PROC_INTEL = 0;
      PROC_ARM = 1;
      PROC_DALVIK = 2;
      PROC_PPC = 3;
      PROC_MIPS = 4;
      PROC_UNK = 5;
    }

    enum Endianess {
      END_LE = 0;
      END_BE = 1;
      END_UNK = 2;
    }

    message Hash {
      enum HashType {
        HASH_NONE = 0;
        HASH_SHA256 = 1;
        HASH_MD5 = 2;
      }

      HashType hash_type = 1;
      string hash_value = 2;
    }

    message Backend {
      enum Disassembler {
        DISASS_UNKNOWN = 0;
        DISASS_IDA = 1;
        DISASS_GHIDRA = 2;
        DISASS_BINARY_NINJA = 3;
      }
      Disassembler name = 1;

      // The version is stored as a string but it might have different meaning
      // depending on the actual backend used.
      // For example on IDA, the version is the IDA_SDK_VERSION constant.
      string version = 2;
    }

    // Executable name : only the basename
    string executable_name = 1;

    // The following fields are set using IDA detection rules
    ISA isa = 2;
    CallingConvention calling_convention = 3;
    Hash hash = 4;
    Endianess endianess = 5;
    AddressSize address_size = 6;

    Backend backend = 7;

    // Whether the quokka export was done with decompiled code or not
    bool decompilation_activated = 10;
  }

  message Operand {
    enum OperandType {
      OPERAND_REGISTER = 0;
      OPERAND_IMMEDIATE = 1;
      OPERAND_MEMORY = 2;
      OPERAND_OTHER = 3;
    }

    OperandType type = 1;

    oneof Value {
      string register_index = 2;
      int64 value = 3;  // TODO merge with address below?
      int64 address = 4;
      string other = 5;  // TODO umbrella value for whatever operand
    }

    uint32 operand_string_index = 7;

    uint32 access = 8;  // (R=1, W=2, RW=3)

    // Optionally encodes disassembler specific data
    optional bytes specific_info = 6;
  }

  message Instruction {
    uint32 size = 1;
    uint32 mnemonic_index = 2;
    repeated uint32 operand_index = 3;
    bool is_thumb = 4;
  }

  message Block {
    enum BlockType {
      BLOCK_TYPE_NORMAL = 0;
      BLOCK_TYPE_INDJUMP = 1;
      BLOCK_TYPE_RET = 2;
      BLOCK_TYPE_NORET = 3;
      BLOCK_TYPE_CNDRET = 4;
      BLOCK_TYPE_ENORET = 5;
      BLOCK_TYPE_EXTERN = 6;
      BLOCK_TYPE_ERROR = 7;
    }

    message InstructionXref {
      uint32 instr_bb_idx = 1;
      uint64 xref_index = 2;
    }

    uint32 segment_index = 1;
    uint32 segment_offset = 2;

    int64 file_offset = 3;

    BlockType block_type = 4;

    repeated uint64 instruction_index = 5;  // field empty in LIGHT mode
    repeated InstructionXref instructions_xref_to = 6;
    repeated InstructionXref instructions_xref_from = 7;

    uint32 size = 8;  // The size in terms of bytes
    // Whether the first instruction of the BB is in thumb mode
    bool is_thumb = 9;

    // Used only in light mode. Number of instructions as detected by the
    // current backend. This is useful to detect a mismatch between the runtime
    // disassembler and the backend one
    uint32 n_instr = 10;
  }

  message Function {
    message Edge {
      enum EdgeType {
        TYPE_UNCONDITIONAL = 0;
        TYPE_TRUE = 1;
        TYPE_FALSE = 2;
        TYPE_DYNAMIC = 3;  // Like a switch jump table
      }

      EdgeType edge_type = 1;
      uint32 source = 2;       // Block index source
      uint32 destination = 3;  // Block index destination

      bool user_defined = 4;
    }

    enum FunctionType {
      TYPE_NORMAL = 0;
      TYPE_IMPORTED = 1;
      TYPE_LIBRARY = 2;
      TYPE_THUNK = 3;
      TYPE_INVALID = 4;
    }

    message Position {
      enum PositionType {
        CENTER = 0;
        TOP_LEFT = 1;
      }

      int32 x = 1;
      int32 y = 2;
      PositionType position_type = 3;
    }

    message BlockPosition {
      uint32 block_id = 1;
      Position position = 2;
    }

    uint32 segment_index = 1;
    uint32 segment_offset = 2;
    int64 file_offset =
        3;  // absolute from file begining (-1 if does not exists)

    repeated Block blocks = 4;
    repeated Edge edges = 5;

    FunctionType function_type = 6;
    string name = 7;

    repeated BlockPosition block_positions = 8;

    // Optional mangled name, it is non-null only if different from `name`
    string mangled_name = 9;

    // Calling convention of the function
    optional CallingConvention calling_convention = 10;

    // Optional decompiled code as a string
    string decompiled_code = 11;
  }

  message Layout {
    message AddressRange {
      uint64 start_address = 1;
      uint64 size = 2;
    }

    enum LayoutType {
      LAYOUT_UNK = 0;
      LAYOUT_CODE = 1;
      LAYOUT_DATA = 2;
      LAYOUT_GAP = 3;
    }

    AddressRange address_range = 1;
    LayoutType layout_type = 2;
  }

  enum DataType {
    TYPE_UNK = 0;
    TYPE_B = 1;
    TYPE_W = 2;
    TYPE_DW = 3;
    TYPE_QW = 4;
    TYPE_OW = 5;
    TYPE_FLOAT = 6;
    TYPE_DOUBLE = 7;
    TYPE_ASCII = 8;   // has to go
    TYPE_STRUCT = 9;  // composite
    TYPE_UNION = 13;  // composite
    TYPE_ENUM = 12;   // enum
    TYPE_ALIGN = 10;
    TYPE_POINTER = 11;
    TYPE_ARRAY = 14;
  }

  // For the future
  // message SimpleType {
  //   DataType dtype = 1;
  //   bool signed = 2;
  // }

  message Data {
    uint32 segment_index = 1;
    uint32 segment_offset = 2;
    int64 file_offset = 3;
    uint32 type_index = 4;

    int32 size = 5;  // 0 if has no size | -1 if variable size

    string name = 6;
    bool not_initialized = 7;
    repeated uint64 xref_to = 8;
    repeated uint64 xref_from = 9;
  }

  message CompositeType {
    message Member {
      uint32 offset = 1;
      string name = 2;
      uint32 type_index = 3;
      uint32 size = 4;
      repeated uint64 xref_from = 5;
    }

    enum CompositeSubType {
      TYPE_STRUCT = 0;
      TYPE_UNION = 1;
      TYPE_ARRAY = 2;
      TYPE_POINTER = 3;
    }

    string name = 1;
    CompositeSubType type = 2;
    uint32 size = 3;
    optional uint32 element_type_idx = 4;  // Only for pointer and array
    repeated Member members = 5;           // Only for union and struct
    // TODO check to see if ida export this. Possibly remove it
    repeated uint64 xref_from = 6;
    string c_str = 7;
  }

  message EnumType {
    message EnumValue {
      string name = 1;
      int64 value = 2;
      repeated uint64 xref_from = 3;
    }
    string name = 1;
    repeated EnumValue values = 2;
    // TODO add a base DataType
    // TODO check to see if ida export this. Possibly remove it
    repeated uint64 xref_from = 3;
  }

  message CompositeDataTypeIdentifier {
    uint32 data_type_index = 1;
    oneof MemberIndex {
      uint32 member_index = 2;
      bool no_member = 3;  // Identify the whole data type
    }
  }

  message DataTypeIdentifier {
    uint32 type_index = 1;
    int32 member_index = 2;  // If -1 it identifies the whole data type
  }

  message DataIdentifier {
    uint32 data_index = 1;
    // Optionally, if the data is composite, a list of member indices is
    // provided. For example to identify data `a.b.c.d` the indices [#b, #c, #d]
    // will be stored in member_chain.
    repeated uint32 member_chain = 2;
  }

  message InstructionIdentifier {
    uint32 function_index = 1;
    uint32 block_index = 2;
    // Offset (in bytes) of the instruction within the basic block
    // Especially useful in light mode
    uint32 offset = 3;
    // Index in the basic block, not in the global instruction table
    // Useful only in self-contained mode
    uint32 instruction_index = 4;
  }

  message Comment {
    enum CommentType {
      COMMENT_INSTRUCTION = 0;
      COMMENT_FUNCTION = 1;
      COMMENT_DATA = 2;
      COMMENT_DATA_TYPE = 3;
      COMMENT_INVALID = 4;
    }

    CommentType type = 1;
    string content = 2;
    oneof Location {
      InstructionIdentifier instruction_id = 3;
      uint32 function_index = 4;
      DataIdentifier data_id = 5;
      CompositeDataTypeIdentifier data_type_id = 6;
    }
  }

  message Reference {
    enum ReferenceType {
      REF_CODE = 0;
      REF_DATA = 1;
      REF_SYMBOL = 2;
      REF_UNK = 3;
    }

    message Location {
      oneof Type {
        uint64 address = 1;
        // Only data types, not data itself
        DataTypeIdentifier data_type_identifier = 2;
      }
    }

    // The location that reference (for ex: an instruction)
    Location source = 1;
    // The location that is referenced (for ex: data)
    Location destination = 2;
    ReferenceType reference_type = 3;
  }

  message Segment {
    enum Type {
      SEGMENT_UNK = 0;
      SEGMENT_CODE = 1;
      SEGMENT_DATA = 2;
      SEGMENT_BSS = 3;
      SEGMENT_NULL = 4;
      SEGMENT_EXTERN = 5;
      SEGMENT_NORMAL = 6;
      SEGMENT_ABSOLUTE_SYMBOLS = 7;
    }

    enum Bitness {
      BITNESS_64 = 0;
      BITNESS_32 = 1;
      BITNESS_16 = 2;
      BITNESS_UNKNOWN = 3;
    }

    string name = 1;
    uint64 virtual_addr = 2;
    uint64 size = 3;
    uint32 permissions = 4;  // Linux style permissions (R=4, W=2, X=1)
    Type type = 5;
    AddressSize address_size = 6;

    // File offset of the start address of the segment. -1 if no offset
    int64 file_offset = 7;
  }

  message OrphanedInstruction {
    message LightInstruction {
      uint32 segment_idx = 1;
      uint32 segment_offset = 2;
      int32 file_offset = 3;
      uint32 size = 4;
    }

    oneof orphan_type {
      uint32 instruction_index = 1;
      LightInstruction instruction = 2;
    }
  }

  message Type {
    oneof OneofType {
      EnumType enum_type = 1;
      CompositeType composite_type = 2;
      DataType primitive_type = 3;
    }
  }

  Meta meta = 1;
  ExporterMeta exporter_meta = 2;

  repeated Layout layout = 3;
  repeated Data data = 4;
  repeated Type types = 5;

  repeated Instruction instructions = 6;
  repeated string mnemonics = 7;

  repeated Function functions = 8;
  repeated Reference references = 9;

  repeated string register_table = 10;
  repeated Operand operands = 11;

  repeated string comment_table = 12;
  repeated Comment comments = 13;

  repeated Segment segments = 14;

  repeated OrphanedInstruction orphaned_instructions = 15;

  repeated string operand_strings = 16;
}
